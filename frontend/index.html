<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XDL Homepage</title>
  <link rel="icon" type="image/png" href="/assets/xdl-homepage-icon.png" />
  <link rel="stylesheet" href="/index.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"><img src="/assets/xdl-homepage-icon.webp" alt="XDL Homepage" /></div>
        <div>
          <p class="brand-title">Homepage</p>
          <div class="brand-subtitle">简洁导航</div>
        </div>
      </div>
      <p class="side-label">分类</p>
      <ul id="categoryList" class="category-list"></ul>
    </aside>

    <main class="content">
      <header class="topbar">
        <form id="searchForm" class="search-form">
          <div class="search-engine-switch" role="radiogroup" aria-label="搜索方式">
            <button class="search-engine-btn" type="button" data-engine="site" role="radio" aria-checked="false">
              <i data-lucide="panel-top"></i>
              站内
            </button>
            <button class="search-engine-btn" type="button" data-engine="google" role="radio" aria-checked="false">
              <img class="search-engine-icon" src="/assets/google.svg" alt="" />
              谷歌
            </button>
            <button class="search-engine-btn" type="button" data-engine="baidu" role="radio" aria-checked="false">
              <img class="search-engine-icon" src="/assets/baidu.svg" alt="" />
              百度
            </button>
          </div>
          <input id="searchInput" type="search" placeholder="搜索网站，或使用搜索引擎搜索" autocomplete="off" />
          <button class="search-btn" type="submit" aria-label="搜索">
            <i data-lucide="search"></i>
          </button>
        </form>
        <div class="top-actions">
          <input id="adminPassword" class="admin-password" type="password" placeholder="管理密码" autocomplete="current-password" title="用于新增、编辑、删除和导入，自动保存在本机浏览器" />
          <a class="btn" href="/downloads/extension.zip" download>
            <i data-lucide="download"></i>
            下载扩展
          </a>
          <button class="btn" type="button" data-action="import-bookmarks">
            <i data-lucide="upload"></i>
            导入书签
          </button>
          <button class="btn primary" type="button" data-action="create-category">
            <i data-lucide="folder-plus"></i>
            新增分类
          </button>
          <div id="summary" class="summary">加载中...</div>
        </div>
      </header>

      <input id="bookmarkFile" class="hidden-file" type="file" accept=".html,.htm,text/html" />

      <div id="batchBar" class="batch-bar">
        <div id="batchInfo" class="batch-info">已选择 0 个网站</div>
        <div class="batch-actions">
          <button class="btn" type="button" data-action="batch-move"><i data-lucide="folder-input"></i>移动到分类</button>
          <button class="btn danger" type="button" data-action="batch-delete"><i data-lucide="trash-2"></i>批量删除</button>
          <button class="btn" type="button" data-action="clear-selection"><i data-lucide="x"></i>取消选择</button>
        </div>
      </div>

      <div id="app" class="state">正在加载导航数据</div>
    </main>
  </div>

  <dialog id="editDialog" class="dialog"></dialog>
  <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-busy="true">
    <div class="loading-box">
      <div class="spinner"></div>
      <div id="loadingText">正在处理，请稍候...</div>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/index.js"></script>
</body>
</html>
