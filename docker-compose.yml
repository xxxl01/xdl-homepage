services:
  xdl-homepage:
    image: ${IMAGE:-ghcr.io/your-github-owner/xdl-homepage:latest}
    container_name: xdl-homepage
    restart: unless-stopped
    ports:
      - "127.0.0.1:8100:8100"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/storage:/app/backend/storage
